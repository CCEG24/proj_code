{% extends 'base.html' %}

{% block title %}{{ pageTitle }}{% endblock %}

{% block header %}{{ pageHeader }}{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="question">{{ questionLabel }}</label>
                <input type="text" id="question" name="question" placeholder="{{ placeholderText }}" value="{{ questionValue }}" required>
                <p>{{ noteText }}</p>
            </div>
            {% if errorMessage %}
                <div class="form-group" style="margin-top:10px;">
                    <p>{{ errorMessage }}</p>
                </div>
            {% endif %}
            <button type="submit" class="btn">{{ buttonText }}</button>
        </form>
        {% if answer %}
            <div class="form-group" style="margin-top:20px;">
                <label>{{ answerLabel }}</label>
                <p>{{ answer }}</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
